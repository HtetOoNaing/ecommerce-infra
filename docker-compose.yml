x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-logging-defaults: &logging-defaults
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # -----------------------------
  # PostgreSQL with proper config
  # -----------------------------
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ecommerce}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"  # Only localhost for security
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ecommerce}"]
    logging: *logging-defaults
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c max_connections=200

  # -----------------------------
  # Redis with persistence
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    logging: *logging-defaults

  # -----------------------------
  # Backend API
  # -----------------------------
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
      args:
        - NODE_ENV=production
    container_name: ecommerce_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-ecommerce}
      - REDIS_URL=redis://redis:6379
      - SERVICE_NAME=backend
    volumes:
      - ./apps/backend/logs:/app/logs
      - /app/node_modules  # Prevent host node_modules override
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
    logging: *logging-defaults
    stop_grace_period: 30s

  # -----------------------------
  # Frontend with static export optimization
  # -----------------------------
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=https://api.${DOMAIN:-infra-pro.com}
    container_name: ecommerce_admin
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
    logging: *logging-defaults

  # -----------------------------
  # Storefront — customer-facing Next.js app
  # -----------------------------
  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      target: production
      args:
        - NEXT_PUBLIC_API_URL=https://api.${DOMAIN:-infra-pro.com}
    container_name: ecommerce_storefront
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
    logging: *logging-defaults

  # -----------------------------
  # Worker with retry strategy
  # -----------------------------
  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: production
    command: node dist/worker.js
    container_name: ecommerce_worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env.production
    environment:
      - NODE_ENV=production
      - WORKER_CONCURRENCY=5
      - REDIS_URL=redis://redis:6379
    logging: *logging-defaults
    stop_grace_period: 60s

  # -----------------------------
  # Prometheus — metrics collection
  # -----------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: ecommerce_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    logging: *logging-defaults

  # -----------------------------
  # Grafana — dashboards & visualization
  # -----------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: ecommerce_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    logging: *logging-defaults

  # -----------------------------
  # Nginx with advanced config
  # -----------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/landing:/usr/share/nginx/landing:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      backend:
        condition: service_healthy
      admin:
        condition: service_healthy
      storefront:
        condition: service_healthy
    logging: *logging-defaults

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: ecommerce_network
    driver: bridge