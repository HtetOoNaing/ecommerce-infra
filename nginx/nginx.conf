# nginx/nginx.conf
#
# ARCHITECTURE NOTE:
# Nginx sits at the edge of your network. Every request hits nginx first.
# It handles: SSL termination, routing, rate limiting, caching, compression.
# Your backend never sees raw HTTPS — nginx decrypts it and forwards plain HTTP.
#
#   Client → [HTTPS] → Nginx → [HTTP] → Backend container
#                             → [HTTP] → Frontend container

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Advanced logging with request ID
    # Every field here is valuable for debugging production issues
    log_format main_ext '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       '"$http_x_forwarded_for" $request_id '
                       '$upstream_addr $upstream_response_time '
                       '$request_time $scheme';
    
    access_log /var/log/nginx/access.log main_ext buffer=32k flush=5s;
    
    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    keepalive_timeout 65;
    keepalive_requests 100;
    
    # Buffer sizes
    client_body_buffer_size 16K;
    client_header_buffer_size 1k;
    client_max_body_size 20M;
    large_client_header_buffers 2 1k;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml
               text/x-js text/x-cross-domain-policy application/x-font-ttf 
               application/x-font-opentype application/vnd.ms-fontobject 
               image/x-icon;
    gzip_disable "msie6";
    
    # Security headers (applied to ALL responses)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Rate limiting zones
    # 10m = 10MB shared memory ≈ 160,000 unique IPs tracked
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    
    # Upstreams — these are the Docker service names
    # Docker DNS resolves "backend" → container IP automatically
    upstream backend_upstream {
        least_conn;
        server backend:4000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream admin_upstream {
        least_conn;
        server admin:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    upstream storefront_upstream {
        least_conn;
        server storefront:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    # ─────────────────────────────────────
    # API subdomain: api.infra-pro.com
    # ─────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.infra-pro.com;
        
        # SSL configuration
        ssl_certificate /etc/nginx/certs/api.infra-pro.com.crt;
        ssl_certificate_key /etc/nginx/certs/api.infra-pro.com.key;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        
        # Modern TLS configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        
        # HSTS — tells browsers to ONLY use HTTPS for this domain for 2 years
        add_header Strict-Transport-Security "max-age=63072000" always;
        
        # CORS — only allow requests from your own frontend domains
        set $cors_origin "";
        if ($http_origin ~* "^https://(app\.infra-pro\.com|infra-pro\.com|www\.infra-pro\.com)$") {
            set $cors_origin $http_origin;
        }
        
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Request-ID" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Request-ID" always;
        add_header Access-Control-Allow-Credentials true always;
        
        # Handle CORS preflight — dedicated location avoids add_header-in-if issue
        location = /preflight {
            internal;
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Request-ID";
            add_header Access-Control-Allow-Credentials true;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain charset=UTF-8';
            add_header Content-Length 0;
            return 204;
        }
        
        # Auth endpoints — stricter rate limit (brute force protection)
        location ~ ^/api/v1/auth/ {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Request-ID" always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Max-Age 1728000;
                return 204;
            }
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Expose-Headers;
            proxy_pass http://backend_upstream;
            include /etc/nginx/conf.d/proxy_params;
        }
        
        # All other API endpoints
        location /api/ {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Request-ID" always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Max-Age 1728000;
                return 204;
            }
            limit_req zone=api_limit burst=20 nodelay;
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Access-Control-Expose-Headers;
            proxy_pass http://backend_upstream;
            include /etc/nginx/conf.d/proxy_params;
        }
        
        # Health check — no rate limit, no logging (called every 30s by Docker)
        location /health {
            proxy_pass http://backend_upstream;
            access_log off;
        }
    }
    
    # ─────────────────────────────────────
    # Landing page: infra-pro.com (public)
    # ─────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name infra-pro.com;
        
        ssl_certificate /etc/nginx/certs/infra-pro.com.crt;
        ssl_certificate_key /etc/nginx/certs/infra-pro.com.key;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        
        add_header Strict-Transport-Security "max-age=63072000" always;
        
        # Next.js static assets — cached forever (filenames have content hashes)
        location /_next/static/ {
            proxy_pass http://storefront_upstream;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
        
        location / {
            proxy_pass http://storefront_upstream;
            include /etc/nginx/conf.d/proxy_params;
            
            # Remove port from redirects
            proxy_redirect http://storefront:3001 https://$host;
        }
    }
    
    # ─────────────────────────────────────
    # Dashboard app: app.infra-pro.com (authenticated)
    # IP allowlist: only VPN / office IPs may access this domain.
    # All other traffic receives 403 before any content is served.
    # ─────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name app.infra-pro.com;
        
        ssl_certificate /etc/nginx/certs/infra-pro.com.crt;
        ssl_certificate_key /etc/nginx/certs/infra-pro.com.key;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        
        add_header Strict-Transport-Security "max-age=63072000" always;

        # ── IP Allowlist ──────────────────────────────────────────────────────
        # Replace these with your actual VPN egress IPs / office CIDRs.
        # Uncomment additional allow lines as needed.
        # allow 10.0.0.0/8;        # Internal VPN range
        # allow 192.168.0.0/16;    # Office LAN
        # allow 203.0.113.42/32;   # Static office IP (example)
        allow 127.0.0.1;            # localhost (health checks / CI)
        deny  all;
        # ─────────────────────────────────────────────────────────────────────
        
        # Next.js static assets — cached forever (filenames have content hashes)
        location /_next/static/ {
            proxy_pass http://admin_upstream;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
        
        location / {
            proxy_pass http://admin_upstream;
            include /etc/nginx/conf.d/proxy_params;
            
            # Remove port from redirects
            proxy_redirect http://admin:3000 https://$host;
        }
    }
    
    # ─────────────────────────────────────
    # HTTP → HTTPS redirect (all domains)
    # ─────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name infra-pro.com api.infra-pro.com app.infra-pro.com www.infra-pro.com;
        
        # Let's Encrypt challenge path (for real SSL certs later)
        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }
        
        location / {
            return 301 https://$server_name$request_uri;
        }
    }
}