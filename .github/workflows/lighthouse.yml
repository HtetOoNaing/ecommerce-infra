name: Lighthouse CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every day at 9 AM UTC
    - cron: "0 9 * * *"

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/storefront/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/storefront
          npm ci

      - name: Build storefront
        run: |
          cd apps/storefront
          npm run build

      - name: Run Lighthouse CI
        run: |
          cd apps/storefront
          npm install -g @lhci/cli@0.14.0
          lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: apps/storefront/.lighthouseci/
          retention-days: 30
